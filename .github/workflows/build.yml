name: Build PlayIMDB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Archive
        run: |
          xcodebuild archive \
            -project PlayIMDB/PlayIMDB.xcodeproj \
            -scheme PlayIMDB \
            -destination 'generic/platform=iOS' \
            -archivePath build/PlayIMDB.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA from archive
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/PlayIMDB.xcarchive/Products/Applications/PlayIMDB.app build/ipa/Payload/
          cd build/ipa
          zip -r ../PlayIMDB.ipa Payload
          cd ../..
          echo "IPA created successfully"
          ls -la build/PlayIMDB.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PlayIMDB-unsigned
          path: build/PlayIMDB.ipa
